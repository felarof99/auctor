app = 'auctor-server'
primary_region = 'sjc'

[build]

[env]
  PORT = "3000"
  REPOS_DIR = "/data/repos"
  CACHE_DB = "/data/cache/auctor-cache.sqlite"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "auctor_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
