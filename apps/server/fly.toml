app = "auctor-server"
primary_region = "sjc"

[build]

[env]
  PORT = "3001"
  REPOS_DIR = "/data/repos"
  CACHE_DB = "/data/cache.sqlite"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "auctor_data"
  destination = "/data"
